name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run ty check
      - name: Test
        run: uv run pytest
      - name: Verify
        run: uv run lcm verify all --json
