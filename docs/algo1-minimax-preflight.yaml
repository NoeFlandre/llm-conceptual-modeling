status: draft
document: algo1-minimax-preflight
purpose: preflight review before running Algorithm 1 with the Anthropic provider path

provider:
  name: anthropic
  note: experimental support path used for MiniMax-compatible Anthropic access
  api_key_env: ANTHROPIC_API_KEY
  base_url_env: ANTHROPIC_BASE_URL
  model: MiniMax-M2.7
  temperature: 0.0
  response_format: json_schema
  schema_names:
    generation: edge_list
    verification: vote_list

runtime:
  algorithm: algo1
  run_style: probe
  resume_supported: true
  replay_artifacts:
    - manifest.json
    - edge_generation_prompt.txt
    - cove_prompt.txt
    - execution_checkpoint.json
    - summary.json
    - events.jsonl
    - state.json
    - error.json

paper_alignment:
  method: direct edge linking plus chain-of-verification
  number_of_calls: 2
  candidate_edges_are_verified: true
  verified_edges_are_subset_of_candidates: true
  no_embedding_loop: true
  no_thesaurus_normalization: true

factorial_design:
  binary_factors:
    use_adjacency_notation: [0, 1]
    use_array_representation: [0, 1]
    include_explanation: [0, 1]
    include_example: [0, 1]
    include_counterexample: [0, 1]
  condition_count: 32
  replications: 5
  supported_pair_names:
    - sg1_sg2
    - sg2_sg3
    - sg3_sg1
  condition_bit_order:
    - adjacency_notation
    - array_representation
    - explanation
    - example
    - counterexample

prompt_contract:
  generation_prompt:
    opener: "You are a helpful assistant who understands Knowledge Maps."
    explanation_text: |
      A knowledge map is a network consisting of nodes and edges. Nodes must have a clear meaning,
      such that we can interpret having 'more' or 'less' of a node. Edges represent the existence
      of a direct relation between two nodes.
    task_text: |
      Your task is to recommend more links between the two maps. These links can use new nodes.
      Do not suggest links that are already in the maps. Do not suggest links between nodes of the
      same map. Return the recommended links as a list of edges in the format [(A, Z), ..., (X, D)].
    output_restriction: |
      Your output must only be the list of proposed edges. Do not repeat any instructions I have
      given you and do not add unnecessary words or phrases.
    dynamic_placeholders:
      rendered_subgraph_1: rendered using the selected representation mode
      rendered_subgraph_2: rendered using the selected representation mode
      example_block: enabled only if include_example=1
      counterexample_block: enabled only if include_counterexample=1

  verification_prompt:
    template: |
      Return whether a causal relationship exists between the source and target concepts for each
      pair in a list. For example, given [('smoking', 'cancer'), ('ice cream sales', 'shark attacks')],
      return ['Y', 'N'] with no other text.
    dynamic_placeholders:
      candidate_pairs: candidate edges emitted by the generation step

representation_modes:
  adjacency_and_array:
    prompt_text: |
      The knowledge map is encoded using a list of nodes and an associated adjacency matrix. The
      adjacency matrix is an n*n square matrix that represents whether each edge exists. In the
      matrix, each row and each column corresponds to a node. Rows and columns come in the same
      order as the list of nodes. A relation between node A and node B is represented as a 1 in
      the row corresponding to A and the column corresponding to B.
    rendered_map_shape: "{'nodes': [...], 'adjacency_matrix': [[...], ...]}"
  adjacency_and_tags:
    prompt_text: |
      The knowledge map is encoded using tags for nodes and an associated adjacency matrix.
    rendered_map_shape: "<knowledge-map><nodes><node>...</node></nodes><adjacency-matrix>...</adjacency-matrix></knowledge-map>"
  edges_and_array:
    prompt_text: |
      The knowledge map is encoded as a list of edges. Each edge is a pair of nodes.
    rendered_map_shape: "[('source', 'target'), ...]"
  edges_and_tags:
    prompt_text: |
      The knowledge map is encoded using a hierarchical markup language representation.
    rendered_map_shape: "<knowledge-map><edge source='source' target='target' />...</knowledge-map>"

fixed_example_block: |
  Here is an example of a desired output for your task. In knowledge map 1, we have the list of
  nodes ['capacity to hire', 'bad employees', 'good reputation'] and the associated adjacency
  matrix [[0,1,0],[0,0,1],[1,0,0]]. In knowledge map 2, we have the list of nodes ['work motivation',
  'productivity', 'financial growth'] and the associated adjacency matrix [[0,1,0],[0,0,1],[0,0,0]].
  In this example, you could recommend 3 new links: 'quality of managers' with 'work motivation',
  'productivity' with 'good reputation' and 'bad employees' with 'quality of managers'. These links
  implicitly create 1 new node: 'quality of managers'. Therefore, this is the expected output:
  [('quality of managers', 'work motivation'), ('productivity', 'good reputation'),
  ('bad employees', 'quality of managers')].

fixed_counterexample_block: |
  Here is an example of a bad output that we do not want to see. A bad output would be:
  [('moon', 'bad employees')]. The error is the recommended link between 'moon' and 'bad employees'.
  Adding the node 'moon' would be incorrect since it has no relationship with the other nodes. The
  proposed link does not represent a true causal relationship.

run_sequence:
  1: write manifest
  2: write edge-generation prompt
  3: call generation prompt
  4: write execution checkpoint
  5: build and write CoVe prompt
  6: call verification prompt
  7: write summary
  8: mark probe finished

preflight_checklist:
  - confirm provider is anthropic
  - confirm api key is available in ANTHROPIC_API_KEY
  - confirm MiniMax-compatible base URL if required
  - confirm model label is the intended MiniMax model string
  - confirm temperature is 0.0
  - confirm prompt factors match the intended condition bits
  - confirm resume is enabled if checkpoint reuse is desired
  - confirm output directory is empty or intentionally resumable
  - confirm the edge prompt and CoVe prompt match the paper-aligned templates

notes:
  - The code path is usable for end-to-end execution if the Anthropic-compatible MiniMax access is available.
  - The exact live provider behavior remains experimental and is not the paper's primary evaluation path.
