    fragment_definitions:
      system_message: You are a helpful assistant who understands Knowledge Maps.
      explanation_fixed: A knowledge map is a network consisting of nodes and edges.
        Nodes must have a clear meaning, such that we can interpret having 'more'
        or 'less' of a node. Edges represent the existence of a direct relation between
        two nodes.
      explanation_variable_matrix: The knowledge map is encoded using a list of nodes
        and an associated adjacency matrix. The adjacency matrix is an n*n square
        matrix that represents whether each edge exists. In the matrix, each row and
        each column corresponds to a node. Rows and columns come in the same order
        as the list of nodes. A relation between node A and node B is represented
        as a 1 in the row corresponding to A and the column corresponding to B.
      example_variable_matrix: 'Here is an example of a desired output for your task.
        In knowledge map 1, we have the list of nodes [''capacity to hire'', ''bad
        employees'', ''good reputation''] and the associated adjacency matrix [[0,1,0],[0,0,1],[1,0,0]].
        In knowledge map 2, we have the list of nodes [''work motivation'', ''productivity'',
        ''financial growth''] and the associated adjacency matrix [[0,1,0],[0,0,1],[0,0,0]].
        In this example, you could recommend 3 new links: ''quality of managers''
        with ''work motivation'', ''productivity'' with ''good reputation'' and ''bad
        employees'' with ''quality of managers''. These links implicitly create 1
        new node: ''quality of managers''. Therefore, this is the expected output:
        [(''quality of managers'', ''work motivation''), (''productivity'', ''good
        reputation''), (''bad employees'', ''quality of managers'')].'
      counter_example_variable_matrix: 'Here is an example of a bad output that we
        do not want to see. In knowledge map 1, we have the list of nodes [''capacity
        to hire'', ''bad employees'', ''good reputation''] and the associated adjacency
        matrix [[0,1,0],[0,0,1],[1,0,0]]. In knowledge map 2, we have the list of
        nodes [''work motivation'', ''productivity'', ''financial growth''] and the
        associated adjacency matrix [[0,1,0],[0,0,1],[0,0,0]]. A bad output would
        be: [(''moon'', ''bad employees'')]. The error is the recommended link between
        ''moon'' and ''bad employees''. Adding the node ''moon'' would be incorrect
        since it has no relationship with the other nodes. The proposed link does
        not represent a true causal relationship.'
      conclusion_fixed: Your output must only be the list of proposed edges. Do not
        repeat any instructions I have given you and do not add unnecessary words
        or phrases.
      explanation_variable_RDF: 'The knowledge map is encoded using the RDF representation.
        The RDF representation uses tags denoted by <>.<S> is the start of the map.
        <E> is the end of the map. In between <S> and <E>, we list all edges of the
        map. Each edge is represented with two tags: <H> precedes the node, then <T>
        precedes the target node.'
      explanation_variable_edges: The knowledge map is encoded as a list of edges.
        Each edge is a pair of nodes.
      explanation_variable_markup: The knowledge map is encoded using a tag-array
        representation. The map is wrapped in <ARRAY><NODES>...</NODES></ARRAY>. Each
        <NODE> stores its ID and only the outgoing targets that are directly connected
        to it.
      example_variable_RDF: 'Here is an example of a desired output for your task.
        In knowledge map 1, we have the following RDF representation: <S><H>capacity
        to hire<T>bad employees<H>bad employees<T>good reputation<H>good reputation<T>capacity
        to hire<E>. In knowledge map 2, we have the following RDF representation:
        <S><H>work motivation<T>productivity<H>productivity<T>financial growth<E>.
        In this example, you could recommend 3 new links: ''quality of managers''
        with ''work motivation'', ''productivity'' with ''good reputation'' and ''bad
        employees'' with ''quality of managers''. These links implicitly create 1
        new node: ''quality of managers''. Therefore, this is the expected output:
        [(''quality of managers'', ''work motivation''), (''productivity'', ''good
        reputation''), (''bad employees'', ''quality of managers'')].'
      example_variable_edges: 'Here is an example of a desired output for your task.
        In knowledge map 1, we have the following list of edges: [(''capacity to hire'',
        ''bad employees''), (''bad employees'', ''good reputation''), (''good reputation'',
        ''capacity to hire'')]. In knowledge map 2, we have the following list of
        edges: [(''work motivation'', ''productivity''), (''productivity'', ''financial
        growth'')]. In this example, you could recommend 3 new links: ''quality of
        managers'' with ''work motivation'', ''productivity'' with ''good reputation''
        and ''bad employees'' with ''quality of managers''. These links implicitly
        create 1 new node: ''quality of managers''. Therefore, this is the expected
        output: [(''quality of managers'', ''work motivation''), (''productivity'',
        ''good reputation''), (''bad employees'', ''quality of managers'')].'
      example_variable_markup: 'Here is an example of a desired output for your task.
        In knowledge map 1, we have the following tag-array representation: <ARRAY><NODES><NODE
        ID= ''capacity to hire''><TARGETS> <TARGET ID= ''bad employees''/></TARGETS></NODE><NODE
        ID= ''bad employees''><TARGETS><TARGET ID= ''good reputation''/></TARGETS></NODE><NODE
        ID= ''good reputation''><TARGETS><TARGET ID= ''capacity to hire''/></TARGETS></NODE></NODES></ARRAY>.
        In knowledge map 2, we have the following tag-array representation: <ARRAY><NODES><NODE
        ID= ''work motivation''><TARGETS> <TARGET ID= ''productivity''/></TARGETS></NODE><NODE
        ID= ''productivity''><TARGETS><TARGET ID= ''financial growth''/></TARGETS></NODE><NODE
        ID= ''financial growth''><TARGETS></TARGETS> </NODE></NODES></ARRAY>. In this
        example, you could recommend 3 new links: ''quality of managers'' with ''work
        motivation'', ''productivity'' with ''good reputation'' and ''bad employees''
        with ''quality of managers''. These links implicitly create 1 new node: ''quality
        of managers''. Therefore, this is the expected output: [(''quality of managers'',
        ''work motivation''), (''productivity'', ''good reputation''), (''bad employees'',
        ''quality of managers'')].'
      counter_example_variable_RDF: 'Here is an example of a bad output that we do
        not want to see. In knowledge map 1, we have the following RDF representation:
        <S><H>capacity to hire<T>bad employees<H>bad employees<T>good reputation<H>good
        reputation<T>capacity to hire<E>. In knowledge map 2, we have the following
        RDF representation: <S><H>work motivation<T>productivity<H>productivity<T>financial
        growth<E>. A bad output would be: [(''moon'', ''bad employees'')]. The error
        is the recommended link between ''moon'' and ''bad employees''. Adding the
        node ''moon'' would be incorrect since it has no relationship with the other
        nodes. The proposed link does not represent a true causal relationship.'
      counter_example_variable_edges: 'Here is an example of a bad output that we
        do not want to see. In knowledge map 1, we have the following list of edges:
        [(''capacity to hire'', ''bad employees''), (''bad employees'', ''good reputation''),
        (''good reputation'', ''capacity to hire'')]. In knowledge map 2, we have
        the following list of edges: [(''work motivation'', ''productivity''), (''productivity'',
        ''financial growth'')]. A bad output would be: [(''moon'', ''bad employees'')].
        The error is the recommended link between ''moon'' and ''bad employees''.
        Adding the node ''moon'' would be incorrect since it has no relationship with
        the other nodes. The proposed link does not represent a true causal relationship.'
      counter_example_variable_markup: 'Here is an example of a bad output that we
        do not want to see. In knowledge map 1, we have the following tag-array representation:
