      task_fixed_sub_1: 'You will get two inputs: Knowledge map 1:'
      task_fixed_sub_2: 'Knowledge map 2:'
      task_fixed_sub_3: "Your task is to recommend more links between the two maps.\
        \ These links can use new nodes. Do not suggest links that are already in\
        \ the maps. Do not suggest links between nodes of the same map. Return the\
        \ recommended links as a list of edges in the format [(A, Z), \u2026, (X,\
        \ D)]."
      cove_verification_template: 'Return whether a causal relationship exists between
        the source and target concepts for each pair in a list. For example, given
        [(''smoking'', ''cancer''), (''ice cream sales'', ''shark attacks'')], return
        [''Y'', ''N''] with no other text. Candidate pairs: {candidate_edges}'
