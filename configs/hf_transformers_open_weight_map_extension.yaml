run:
  provider: hf-transformers
  output_root: /workspace/results/hf-open-weight-map-extension
  replications: 5

runtime:
  seed: 20260331
  temperature: 0.0
  quantization: none
  device_policy: cuda-only
  thinking_mode_by_model:
    mistralai/Ministral-3-8B-Instruct-2512: acknowledged-unsupported
    Qwen/Qwen3.5-9B: disabled
  context_policy:
    prompt_truncation: forbid
    safety_margin_tokens: 64
    generation_timeout_seconds: 180
  max_new_tokens_by_schema:
    children_by_label: 384

models:
  chat_models:
    - mistralai/Ministral-3-8B-Instruct-2512
    - Qwen/Qwen3.5-9B
  embedding_model: Qwen/Qwen3-Embedding-0.6B

decoding:
  greedy:
    enabled: false
  beam:
    enabled: true
    num_beams: [6]
  contrastive:
    enabled: false

inputs:
  graph_sources:
    - babs_johnson
    - clarice_starling
    - philip_marlowe

shared_fragments: {}

algorithms:
  algo3:
    pair_names:
      - subgraph_1_to_subgraph_3
      - subgraph_2_to_subgraph_1
      - subgraph_2_to_subgraph_3
    base_fragments: []
    fixed_runtime_fields:
      include_counterexample: false
    fixed_columns:
      Counter-Example: -1
    factors:
      example:
        column: Example
        levels: [-1, 1]
        runtime_field: include_example
        low_runtime_value: false
        high_runtime_value: true
        low_fragments: []
        high_fragments: []
      number_of_words:
        column: Number of Words
        levels: [3, 5]
        runtime_field: child_count
        low_runtime_value: 3
        high_runtime_value: 5
        low_fragments: []
        high_fragments: []
      depth:
        column: Depth
        levels: [1, 2]
        runtime_field: max_depth
        low_runtime_value: 1
        high_runtime_value: 2
        low_fragments: []
        high_fragments: []
    fragment_definitions:
      system_message: >-
        You are a helpful assistant who can creatively suggest relevant ideas.
      explanation_variable: >-
        Your input is a set of concept names. All concept names must have a clear meaning, such
        that we can interpret having 'more' or 'less' of a concept.
      input_variable: >-
        Your input is the following list of concept names:
      task: >-
        Your task is to recommend {} related concept names for each of the names in the input. Do
        not suggest names that are in the input. Your output must include the list of the {}
        proposed names for each of the input names. Do not include any other text. Return your
        proposed names in a dictionary format {{ 'A' : ['B' , 'C', 'D'], 'E' : ['F' , 'G' , 'H'],
        ..., 'U' : ['V' , 'W' , 'X'] }}.
      example_3words: >-
        Here is an example of a desired output for your task. We have the list of concepts
        ['capacity to hire', 'bad employees', 'good reputation']. In this example, you could
        recommend these 9 new concepts: 'employment potential', 'hiring capability', 'staffing
        ability', 'underperformers', 'inefficient staff', 'problematic workers', 'positive image',
        'favorable standing', 'high regard'. Therefore, this is the expected output: {{ "capacity
        to hire": ['employment potential', 'hiring capability', 'staffing ability'], "bad
        employees": ['underperformers', 'inefficient staff', 'problematic workers'], "good
        reputation": ['positive image', 'favorable standing', 'high regard'] }}.
      example_5words: >-
        Here is an example of a desired output for your task. We have the list of concepts
        ['capacity to hire', 'bad employees', 'good reputation']. In this example, you could
        recommend these 15 new concepts: 'employment potential', 'hiring capability', 'staffing
        ability', 'underperformers', 'inefficient staff', 'problematic workers', 'positive image',
        'favorable standing', 'high regard'. Therefore, this is the expected output: { "capacity
        to hire": ["employment potential", "hiring capability", "staffing ability", "recruitment
        capacity", "talent acquisition"], "bad employees": ["underperformers", "inefficient
        staff", "problematic workers", "low performers", "unproductive staff"], "good
        reputation": ["positive image", "favorable standing", "high regard", "excellent
        reputation", "commendable status"] }.
      counter_example_3words: >-
        Counterexamples are fixed off for this scoped map-extension batch.
      counter_example_5words: >-
        Counterexamples are fixed off for this scoped map-extension batch.
      conclusion: >-
        Your output must only be the list of proposed concepts. Do not repeat any instructions I
        have given you and do not add unnecessary words or phrases.
    prompt_templates:
      tree_expansion: ""
