full_prompt: 'You are a helpful assistant who understands Knowledge Maps. A knowledge
  map is a network consisting of nodes and edges. Nodes must have a clear meaning,
  such that we can interpret having ''more'' or ''less'' of a node. Edges represent
  the existence of a direct relation between two nodes. The knowledge map is encoded
  using a hierarchical markup language representation. The knowledge map is encoded
  using tags that store directed edges. Here is an example of a desired output for
  your task. In knowledge map 1, we have the list of nodes [''capacity to hire'',
  ''bad employees'', ''good reputation''] and the associated adjacency matrix [[0,1,0],[0,0,1],[1,0,0]].
  In knowledge map 2, we have the list of nodes [''work motivation'', ''productivity'',
  ''financial growth''] and the associated adjacency matrix [[0,1,0],[0,0,1],[0,0,0]].
  In this example, you could recommend 3 new links: ''quality of managers'' with ''work
  motivation'', ''productivity'' with ''good reputation'' and ''bad employees'' with
  ''quality of managers''. These links implicitly create 1 new node: ''quality of
  managers''. Therefore, this is the expected output: [(''quality of managers'', ''work
  motivation''), (''productivity'', ''good reputation''), (''bad employees'', ''quality
  of managers'')]. Here is an example of a bad output that we do not want to see.
  A bad output would be: [(''moon'', ''bad employees'')]. The error is the recommended
  link between ''moon'' and ''bad employees''. Adding the node ''moon'' would be incorrect
  since it has no relationship with the other nodes. The proposed link does not represent
